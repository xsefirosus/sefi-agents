          echo "TEMPLATE: invoke your headless agent here to run /sefi:triage"

      - name: Enforce budget caps
        run: bash plugins/sefi-core/scripts/budget-check.sh --scope daily --spent 0

      - name: Commit state and open PR (never auto-merge)
        run: |
          # TEMPLATE: commit state/ changes and open a PR; a human merges. Never auto-merge.
          echo "TEMPLATE: git add state/ && git commit && open PR (never merge)"
