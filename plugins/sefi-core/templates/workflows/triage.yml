name: sefi-morning-triage

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run headless triage (choose one CLI for your harness)
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
